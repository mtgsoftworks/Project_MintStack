# ===========================================
# MintStack Finance Portal - Production Docker Compose
# ===========================================
# This file uses Docker Secrets for sensitive data
# Run with: docker compose -f docker-compose.prod.yml up -d
# ===========================================
#
# NETWORK SEGMENTATION (G4):
# - data-network: postgres, redis, opensearch (data layer)
# - app-network: backend, frontend (application layer)
# - auth-network: keycloak, openldap (authentication layer)
# - obs-network: prometheus, grafana, alertmanager, otel, logstash, kafka (observability)
#
# SECRETS MANAGEMENT (G5):
# For production, consider using external secret managers:
#
# Option 1: Docker Swarm Secrets (current approach)
#   echo "secret_value" | docker secret create secret_name -
#
# Option 2: HashiCorp Vault Integration
#   Install vault-container-agent sidecar containers
#   Reference: https://www.vaultproject.io/docs/platform/docker
#   docker-secret-vault plugin: https://github.com/roboll/docker-secret-vault
#
# Option 3: Kubernetes Secrets (if using K8s)
#   kubectl create secret generic postgres-password --from-literal=password=xxx
#
# Option 4: Cloud Provider Secret Managers
#   AWS Secrets Manager / Parameter Store
#   Azure Key Vault
#   GCP Secret Manager
#
# IMPORTANT: Never commit ./secrets/*.txt files to version control
# Add to .gitignore: secrets/
# ===========================================

services:
  # ===========================================
  # DATA LAYER
  # ===========================================
  
  postgres:
    image: postgres:15-alpine
    container_name: mintstack-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_MULTIPLE_DATABASES: mintstack_finance,keycloak
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - data-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: mintstack-redis-prod
    command: >
      sh -c "redis-server --requirepass $$(cat /run/secrets/redis_password)"
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - data-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # AUTH LAYER
  # ===========================================

  openldap:
    image: osixia/openldap:1.5.0
    container_name: mintstack-openldap-prod
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD_FILE: /run/secrets/ldap_admin_password
      LDAP_CONFIG_PASSWORD_FILE: /run/secrets/ldap_admin_password
      LDAP_TLS: "false"
    secrets:
      - ldap_admin_password
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      - ./openldap/ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom
    networks:
      - auth-network
    command: --copy-service
    deploy:
      resources:
        limits:
          memory: 256M

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: mintstack-keycloak-prod
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD_FILE: /run/secrets/postgres_password
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_PROXY_HEADERS: xforwarded
    secrets:
      - keycloak_admin_password
      - postgres_password
    command: start --import-realm --optimized
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_started
    networks:
      - auth-network
      - data-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then exit 0; else exit 1; fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================
  # APPLICATION LAYER
  # ===========================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Note: container_name omitted intentionally — replicas: 2 is used
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD_FILE: /run/secrets/postgres_password
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD_FILE: /run/secrets/redis_password
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mintstack-finance/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/mintstack-finance
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: PLAIN
      SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="${KAFKA_SASL_PASSWORD}";
      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE:-100}
      APP_RATE_LIMIT_AUTHENTICATED_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_AUTHENTICATED_REQUESTS_PER_MINUTE:-200}
      APP_RATE_LIMIT_ADMIN_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_ADMIN_REQUESTS_PER_MINUTE:-500}
      APP_SCHEDULER_TCMB_RATES_CRON: "${APP_SCHEDULER_TCMB_RATES_CRON:-0 30 10,16 * * MON-FRI}"
      APP_SCHEDULER_STOCK_PRICES_CRON: "${APP_SCHEDULER_STOCK_PRICES_CRON:-*/20 * * * * *}"
      APP_SCHEDULER_BOND_PRICES_CRON: "${APP_SCHEDULER_BOND_PRICES_CRON:-0 */2 * * * *}"
      APP_SCHEDULER_FUND_PRICES_CRON: "${APP_SCHEDULER_FUND_PRICES_CRON:-0 */3 * * * *}"
      APP_SCHEDULER_VIOP_PRICES_CRON: "${APP_SCHEDULER_VIOP_PRICES_CRON:-*/30 * * * * *}"
      APP_SCHEDULER_FOREX_RATES_CRON: "${APP_SCHEDULER_FOREX_RATES_CRON:-0 */5 * * * MON-FRI}"
      APP_SCHEDULER_CRYPTO_PRICES_CRON: "${APP_SCHEDULER_CRYPTO_PRICES_CRON:-0 * * * * *}"
      APP_SCHEDULER_NEWS_FETCH_CRON: "${APP_SCHEDULER_NEWS_FETCH_CRON:-0 */15 * * * *}"
      APP_SCHEDULER_CLEANUP_CRON: "${APP_SCHEDULER_CLEANUP_CRON:-0 0 2 * * *}"
      APP_SCHEDULER_INSTRUMENT_BATCH_SIZE: ${APP_SCHEDULER_INSTRUMENT_BATCH_SIZE:-5}
      APP_NEWS_LLM_ENABLED: ${APP_NEWS_LLM_ENABLED:-true}
      APP_NEWS_LLM_BASE_URL: ${APP_NEWS_LLM_BASE_URL:-https://api.openai.com}
      APP_NEWS_LLM_ENDPOINT: ${APP_NEWS_LLM_ENDPOINT:-/v1/chat/completions}
      APP_NEWS_LLM_MODEL: ${APP_NEWS_LLM_MODEL:-gpt-4.1-mini}
      APP_NEWS_LLM_API_KEY: ${OPENAI_API_KEY:-}
      APP_NEWS_LLM_API_KEY_HEADER: ${APP_NEWS_LLM_API_KEY_HEADER:-Authorization}
      APP_NEWS_LLM_API_KEY_PREFIX: ${APP_NEWS_LLM_API_KEY_PREFIX:-Bearer}
      APP_NEWS_LLM_TIMEOUT_MS: ${APP_NEWS_LLM_TIMEOUT_MS:-15000}
      APP_NEWS_LLM_MAX_INPUT_CHARS: ${APP_NEWS_LLM_MAX_INPUT_CHARS:-4000}
      APP_NEWS_LLM_TEMPERATURE: ${APP_NEWS_LLM_TEMPERATURE:-0.2}
      APP_EXTERNAL_API_FINTABLES_ENABLED: ${APP_EXTERNAL_API_FINTABLES_ENABLED:-true}
      FINTABLES_BASE_URL: ${FINTABLES_BASE_URL:-https://api.fintables.com}
      FINTABLES_API_KEY: ${FINTABLES_API_KEY:-}
      APP_EXTERNAL_API_FINTABLES_TIMEOUT: ${APP_EXTERNAL_API_FINTABLES_TIMEOUT:-15000}
      APP_ALERT_WEBHOOK_ENABLED: ${APP_ALERT_WEBHOOK_ENABLED:-true}
      APP_ALERT_WEBHOOK_REQUIRE_SIGNATURE: ${APP_ALERT_WEBHOOK_REQUIRE_SIGNATURE:-false}
      APP_ALERT_WEBHOOK_SECRET: ${APP_ALERT_WEBHOOK_SECRET:-}
      APP_ALERT_WEBHOOK_SIGNATURE_HEADER: ${APP_ALERT_WEBHOOK_SIGNATURE_HEADER:-X-Alert-Signature}
      APP_ALERT_WEBHOOK_SIGNATURE_PREFIX: ${APP_ALERT_WEBHOOK_SIGNATURE_PREFIX:-sha256=}
      APP_ALERT_WEBHOOK_TRUST_FORWARDED_FOR: ${APP_ALERT_WEBHOOK_TRUST_FORWARDED_FOR:-false}
      APP_ALERT_WEBHOOK_TRUSTED_PROXY_CIDRS: ${APP_ALERT_WEBHOOK_TRUSTED_PROXY_CIDRS:-}
      APP_ALERT_WEBHOOK_ALLOWED_CIDRS: ${APP_ALERT_WEBHOOK_ALLOWED_CIDRS:-172.16.0.0/12}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: finance-portal
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OPENSEARCH_SCHEME: https
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      ALPHA_VANTAGE_API_KEY_FILE: /run/secrets/alpha_vantage_key
    secrets:
      - postgres_password
      - redis_password
      - alpha_vantage_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app-network
      - data-network
      - auth-network
      - obs-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
      replicas: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-mintstack-finance}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-finance-frontend}
    container_name: mintstack-frontend-prod
    depends_on:
      - backend
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # OBSERVABILITY LAYER
  # ===========================================

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mintstack-kafka-prod
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_LISTENER_NAME_INTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="${KAFKA_SASL_PASSWORD}" user_kafka="${KAFKA_SASL_PASSWORD}";
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/9092'"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: mintstack-opensearch-prod
    environment:
      - cluster.name=mintstack-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - data-network
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "curl -k -s -u admin:${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: mintstack-logstash-prod
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./docker/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      KAFKA_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="${KAFKA_SASL_PASSWORD}";
      OPENSEARCH_HOSTS: https://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_SSL: true
      OPENSEARCH_SSL_VERIFY: false
    depends_on:
      - kafka
      - opensearch
    networks:
      - obs-network
      - data-network
    deploy:
      resources:
        limits:
          memory: 512M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: mintstack-otel-collector-prod
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    volumes:
      - ./docker/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - opensearch
    networks:
      - obs-network
      - data-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # MONITORING LAYER (G1, G2, G3)
  # ===========================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: mintstack-prometheus-prod
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.config.file=/etc/prometheus/web.yml'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./docker/prometheus/web.yml:/etc/prometheus/web.yml:ro
      - prometheus_data:/prometheus
    networks:
      - obs-network
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: mintstack-alertmanager-prod
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://alertmanager.mintstack.local'
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - obs-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  grafana:
    image: grafana/grafana:10.2.2
    container_name: mintstack-grafana-prod
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: https://grafana.mintstack.local
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================
  # REVERSE PROXY
  # ===========================================

  nginx:
    image: nginx:alpine
    container_name: mintstack-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
      - auth-network
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  data-network:
    driver: bridge
    internal: true
  app-network:
    driver: bridge
  auth-network:
    driver: bridge
    internal: true
  obs-network:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  redis_data:
  openldap_data:
  openldap_config:
  kafka_data:
  opensearch_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

# ===========================================
# DOCKER SECRETS CONFIGURATION
# ===========================================
# Create secrets before deploying:
#   echo "your_postgres_password" | docker secret create postgres_password -
#   echo "your_redis_password" | docker secret create redis_password -
#   echo "your_keycloak_password" | docker secret create keycloak_admin_password -
#   echo "your_alpha_vantage_key" | docker secret create alpha_vantage_key -
#   echo "your_grafana_password" | docker secret create grafana_admin_password -
#   echo "your_ldap_password" | docker secret create ldap_admin_password -
#
# For HashiCorp Vault integration, use the vault-container-agent sidecar
# or docker-secret-vault plugin to inject secrets at runtime.
# See: https://github.com/roboll/docker-secret-vault
# ===========================================

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  keycloak_admin_password:
    file: ./secrets/keycloak_admin_password.txt
  alpha_vantage_key:
    file: ./secrets/alpha_vantage_key.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
  ldap_admin_password:
    file: ./secrets/ldap_admin_password.txt
