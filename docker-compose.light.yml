# MintStack Finance - Lightweight Dev Compose
# Minimum altyapı: PostgreSQL, Redis, Keycloak, OpenLDAP, Backend, Frontend, Nginx
# Kafka, OpenSearch ve observability servisleri hariç (~4 GB RAM yeterli)
#
# Kullanım: docker compose -f docker-compose.light.yml up -d

services:
  # ===========================================
  # DATA LAYER
  # ===========================================

  postgres:
    image: postgres:15-alpine
    container_name: mintstack-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: mintstack_finance,keycloak,mintstack
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: mintstack-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: mintstack-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      LDAP_CONNECTION_URL: ldap://openldap:389
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 384M

  openldap:
    image: osixia/openldap:1.5.0
    container_name: mintstack-openldap
    command: --copy-service
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_TLS: "false"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      - ./openldap/ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
    ports:
      - "127.0.0.1:389:389"
      - "127.0.0.1:636:636"
    networks:
      - mintstack-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # ===========================================
  # APPLICATION LAYER
  # ===========================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mintstack-backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Kafka disabled in light mode
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ""
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -Dlog4j.configurationFile=classpath:log4j2-console.xml"
      APP_MESSAGING_ENABLED: "false"
      APP_MARKET_DATA_CONSUMER_ENABLED: "false"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mintstack-finance/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/mintstack-finance
      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE:-100}
      APP_RATE_LIMIT_AUTHENTICATED_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_AUTHENTICATED_REQUESTS_PER_MINUTE:-200}
      APP_RATE_LIMIT_ADMIN_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_ADMIN_REQUESTS_PER_MINUTE:-500}
      APP_SCHEDULER_TCMB_RATES_CRON: "${APP_SCHEDULER_TCMB_RATES_CRON:-0 30 10,16 * * MON-FRI}"
      APP_SCHEDULER_STOCK_PRICES_CRON: "${APP_SCHEDULER_STOCK_PRICES_CRON:-*/20 * * * * *}"
      APP_SCHEDULER_BOND_PRICES_CRON: "${APP_SCHEDULER_BOND_PRICES_CRON:-0 */2 * * * *}"
      APP_SCHEDULER_FUND_PRICES_CRON: "${APP_SCHEDULER_FUND_PRICES_CRON:-0 */3 * * * *}"
      APP_SCHEDULER_VIOP_PRICES_CRON: "${APP_SCHEDULER_VIOP_PRICES_CRON:-*/30 * * * * *}"
      APP_SCHEDULER_FOREX_RATES_CRON: "${APP_SCHEDULER_FOREX_RATES_CRON:-0 */5 * * * MON-FRI}"
      APP_SCHEDULER_CRYPTO_PRICES_CRON: "${APP_SCHEDULER_CRYPTO_PRICES_CRON:-0 * * * * *}"
      APP_SCHEDULER_NEWS_FETCH_CRON: "${APP_SCHEDULER_NEWS_FETCH_CRON:-0 */15 * * * *}"
      APP_SCHEDULER_CLEANUP_CRON: "${APP_SCHEDULER_CLEANUP_CRON:-0 0 2 * * *}"
      APP_SCHEDULER_INSTRUMENT_BATCH_SIZE: ${APP_SCHEDULER_INSTRUMENT_BATCH_SIZE:-5}
      APP_NEWS_LLM_ENABLED: ${APP_NEWS_LLM_ENABLED:-true}
      APP_NEWS_LLM_BASE_URL: ${APP_NEWS_LLM_BASE_URL:-https://api.openai.com}
      APP_NEWS_LLM_ENDPOINT: ${APP_NEWS_LLM_ENDPOINT:-/v1/chat/completions}
      APP_NEWS_LLM_MODEL: ${APP_NEWS_LLM_MODEL:-gpt-4.1-mini}
      APP_NEWS_LLM_API_KEY: ${OPENAI_API_KEY:-}
      APP_NEWS_LLM_API_KEY_HEADER: ${APP_NEWS_LLM_API_KEY_HEADER:-Authorization}
      APP_NEWS_LLM_API_KEY_PREFIX: ${APP_NEWS_LLM_API_KEY_PREFIX:-Bearer}
      APP_NEWS_LLM_TIMEOUT_MS: ${APP_NEWS_LLM_TIMEOUT_MS:-15000}
      APP_NEWS_LLM_MAX_INPUT_CHARS: ${APP_NEWS_LLM_MAX_INPUT_CHARS:-4000}
      APP_NEWS_LLM_TEMPERATURE: ${APP_NEWS_LLM_TEMPERATURE:-0.2}
      APP_EXTERNAL_API_FINTABLES_ENABLED: ${APP_EXTERNAL_API_FINTABLES_ENABLED:-true}
      FINTABLES_BASE_URL: ${FINTABLES_BASE_URL:-https://api.fintables.com}
      FINTABLES_API_KEY: ${FINTABLES_API_KEY:-}
      APP_EXTERNAL_API_FINTABLES_TIMEOUT: ${APP_EXTERNAL_API_FINTABLES_TIMEOUT:-15000}
      APP_ALERT_WEBHOOK_ENABLED: ${APP_ALERT_WEBHOOK_ENABLED:-true}
      APP_ALERT_WEBHOOK_REQUIRE_SIGNATURE: ${APP_ALERT_WEBHOOK_REQUIRE_SIGNATURE:-false}
      APP_ALERT_WEBHOOK_SECRET: ${APP_ALERT_WEBHOOK_SECRET:-}
      APP_ALERT_WEBHOOK_SIGNATURE_HEADER: ${APP_ALERT_WEBHOOK_SIGNATURE_HEADER:-X-Alert-Signature}
      APP_ALERT_WEBHOOK_SIGNATURE_PREFIX: ${APP_ALERT_WEBHOOK_SIGNATURE_PREFIX:-sha256=}
      APP_ALERT_WEBHOOK_TRUST_FORWARDED_FOR: ${APP_ALERT_WEBHOOK_TRUST_FORWARDED_FOR:-false}
      APP_ALERT_WEBHOOK_TRUSTED_PROXY_CIDRS: ${APP_ALERT_WEBHOOK_TRUSTED_PROXY_CIDRS:-}
      APP_ALERT_WEBHOOK_ALLOWED_CIDRS: ${APP_ALERT_WEBHOOK_ALLOWED_CIDRS:-172.16.0.0/12}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      # OpenTelemetry and OpenSearch services are not started in light mode.
      # Keep a syntactically valid OpenSearch host so the optional client bean
      # can initialize; calls will fail closed and return empty admin log data.
      MANAGEMENT_TRACING_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: finance-portal
      OPENSEARCH_HOST: localhost
      OPENSEARCH_PORT: 9200
      OPENSEARCH_SCHEME: http
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8088/api/v1
        VITE_WS_URL: http://localhost:8088/ws
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    container_name: mintstack-frontend
    environment:
      VITE_API_URL: http://localhost:8088/api/v1
      VITE_WS_URL: http://localhost:8088/ws
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - mintstack-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  nginx:
    image: nginx:alpine
    container_name: mintstack-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

networks:
  mintstack-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  openldap_data:
  openldap_config:
