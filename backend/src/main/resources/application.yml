spring:
  application:
    name: finance-portal

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mintstack_finance?useUnicode=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:mintstack}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          "[time_zone]": UTC
    open-in-view: false

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    properties:
      "[security.protocol]": ${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
      "[sasl.mechanism]": ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:PLAIN}
      "[sasl.jaas.config]": ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: finance-portal
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "com.mintstack.finance.*"

  # Security - OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8180/realms/mintstack-finance}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8180/realms/mintstack-finance/protocol/openid-connect/certs}

# Server Configuration
server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 10s
        slowCallRateThreshold: 100
    instances:
      tcmbApi:
        baseConfig: default
        waitDurationInOpenState: 120s
      finnhubApi:
        baseConfig: default
        failureRateThreshold: 60
      alphaVantageApi:
        baseConfig: default
        failureRateThreshold: 60
      yahooFinanceApi:
        baseConfig: default
      rssNewsApi:
        baseConfig: default
        failureRateThreshold: 70
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
    instances:
      externalApi:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 15s
        cancelRunningFuture: true
    instances:
      externalApi:
        baseConfig: default

# OpenSearch Configuration
opensearch:
  host: ${OPENSEARCH_HOST:localhost}
  port: ${OPENSEARCH_PORT:19200}
  scheme: ${OPENSEARCH_SCHEME:http}
  username: ${OPENSEARCH_USERNAME:}
  password: ${OPENSEARCH_PASSWORD:}

# OpenTelemetry Configuration
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
  service:
    name: ${OTEL_SERVICE_NAME:finance-portal}
  resource:
    attributes:
      service.namespace: mintstack
      deployment.environment: ${SPRING_PROFILES_ACTIVE:dev}

# Application Custom Configuration
app:
  messaging:
    enabled: ${APP_MESSAGING_ENABLED:true}
    market-data-consumer:
      enabled: ${APP_MARKET_DATA_CONSUMER_ENABLED:true}
      group-id: ${APP_MARKET_DATA_CONSUMER_GROUP_ID:market-data-consumer}
      dlt-enabled: ${APP_MARKET_DATA_CONSUMER_DLT_ENABLED:true}
      retry:
        max-attempts: ${APP_MARKET_DATA_CONSUMER_RETRY_MAX_ATTEMPTS:3}
        backoff-ms: ${APP_MARKET_DATA_CONSUMER_RETRY_BACKOFF_MS:1000}

  news:
    fetch-when-simulation-enabled: ${APP_NEWS_FETCH_WHEN_SIMULATION_ENABLED:true}
    simulation-news-enabled: ${APP_NEWS_SIMULATION_ENABLED:false}
    max-items-per-feed: ${APP_NEWS_MAX_ITEMS_PER_FEED:10}
    connect-timeout-ms: ${APP_NEWS_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${APP_NEWS_READ_TIMEOUT_MS:10000}
    article-preview-enabled: ${APP_NEWS_ARTICLE_PREVIEW_ENABLED:true}
    article-preview-connect-timeout-ms: ${APP_NEWS_ARTICLE_PREVIEW_CONNECT_TIMEOUT_MS:4000}
    article-preview-read-timeout-ms: ${APP_NEWS_ARTICLE_PREVIEW_READ_TIMEOUT_MS:7000}
    article-preview-max-bytes: ${APP_NEWS_ARTICLE_PREVIEW_MAX_BYTES:350000}
    feeds:
      - code: bloomberg-markets
        url: https://feeds.bloomberg.com/markets/news.rss
        category-slug: piyasa
        source-name: Bloomberg Markets
        enabled: true
        priority: 10
      - code: bloomberg-business
        url: https://feeds.bloomberg.com/business/news.rss
        category-slug: ekonomi
        source-name: Bloomberg Business
        enabled: true
        priority: 20
      - code: cnbc-economy
        url: https://www.cnbc.com/id/20910258/device/rss/rss.html
        category-slug: ekonomi
        source-name: CNBC Economy
        enabled: true
        priority: 25
      - code: cnbc-earnings
        url: https://www.cnbc.com/id/15839135/device/rss/rss.html
        category-slug: sirket
        source-name: CNBC Earnings
        enabled: true
        priority: 30
      - code: yahoo-finance-news
        url: https://finance.yahoo.com/news/rssindex
        category-slug: sirket
        source-name: Yahoo Finance
        enabled: true
        priority: 35
      - code: marketwatch-topstories
        url: https://feeds.content.dowjones.io/public/rss/mw_topstories
        category-slug: piyasa
        source-name: MarketWatch
        enabled: true
        priority: 40
      - code: wsj-markets
        url: https://feeds.a.dj.com/rss/RSSMarketsMain.xml
        category-slug: piyasa
        source-name: WSJ Markets
        enabled: false
        priority: 50
      - code: tcmb-basin-duyurulari
        url: https://www.tcmb.gov.tr/wps/wcm/connect/TR/TCMB+TR/Bottom+Menu/Diger/RSS/Basin+Duyurulari
        category-slug: ekonomi
        source-name: TCMB Basin Duyurulari
        enabled: true
        priority: 60
      - code: tcmb-ppk-kararlari
        url: https://www.tcmb.gov.tr/wps/wcm/connect/TR/TCMB+TR/Bottom+Menu/Diger/RSS/PPK+Kararlari
        category-slug: ekonomi
        source-name: TCMB PPK Kararlari
        enabled: true
        priority: 70
      - code: tcmb-veriler
        url: https://www.tcmb.gov.tr/wps/wcm/connect/TR/TCMB+TR/Bottom+Menu/Diger/RSS/Veriler
        category-slug: ekonomi
        source-name: TCMB Veriler
        enabled: false
        priority: 80
      - code: tcmb-yayinlar
        url: https://www.tcmb.gov.tr/wps/wcm/connect/TR/TCMB+TR/Bottom+Menu/Diger/RSS/Yayinlar
        category-slug: ekonomi
        source-name: TCMB Yayinlar
        enabled: false
        priority: 90
      - code: dunya-ekonomi
        url: https://www.dunya.com/rss/ekonomi.xml
        category-slug: ekonomi
        source-name: Dunya Ekonomi
        enabled: true
        priority: 100
      - code: foreks-rss
        url: https://www.foreks.com/rss/
        category-slug: piyasa
        source-name: Foreks
        enabled: true
        priority: 110
      - code: aa-ekonomi
        url: https://www.aa.com.tr/tr/rss/default?cat=ekonomi
        category-slug: ekonomi
        source-name: Anadolu Ajansi
        enabled: true
        priority: 120
      - code: t24-ekonomi
        url: https://t24.com.tr/rss/haber/ekonomi
        category-slug: ekonomi
        source-name: T24 Ekonomi
        enabled: false
        priority: 120
    llm:
      enabled: ${APP_NEWS_LLM_ENABLED:false}
      base-url: ${APP_NEWS_LLM_BASE_URL:}
      endpoint: ${APP_NEWS_LLM_ENDPOINT:/v1/chat/completions}
      model: ${APP_NEWS_LLM_MODEL:gpt-4.1-mini}
      api-key: ${APP_NEWS_LLM_API_KEY:}
      api-key-header: ${APP_NEWS_LLM_API_KEY_HEADER:Authorization}
      api-key-prefix: ${APP_NEWS_LLM_API_KEY_PREFIX:Bearer }
      timeout-ms: ${APP_NEWS_LLM_TIMEOUT_MS:15000}
      max-input-chars: ${APP_NEWS_LLM_MAX_INPUT_CHARS:4000}
      temperature: ${APP_NEWS_LLM_TEMPERATURE:0.2}

  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:3001
      - http://127.0.0.1:3001
      - http://localhost:3002
      - http://127.0.0.1:3002
      - http://localhost:8088
      - http://127.0.0.1:8088
    allowed-origin-patterns:
      - https://*.up.railway.app
      - https://*.railway.app
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

  # External API Configuration
  external-api:
    tcmb:
      base-url: https://www.tcmb.gov.tr/kurlar
      timeout: 10000
    yahoo-finance:
      base-url: https://query1.finance.yahoo.com/v8/finance
      timeout: 15000
    alpha-vantage:
      base-url: https://www.alphavantage.co/query
      api-key: ${ALPHA_VANTAGE_API_KEY:demo}
      timeout: 15000
    finnhub:
      base-url: https://finnhub.io/api/v1
      api-key: ${FINNHUB_API_KEY:}
      timeout: 15000
    tefas:
      enabled: ${APP_EXTERNAL_API_TEFAS_ENABLED:true}
      base-url: https://www.tefas.gov.tr/api/funds
      fund-list-endpoint: ${APP_EXTERNAL_API_TEFAS_FUND_LIST_ENDPOINT:/fonGnlBlgSiraliGetir}
      timeout: ${APP_EXTERNAL_API_TEFAS_TIMEOUT:60000}
      default-fund-kinds: ${APP_EXTERNAL_API_TEFAS_DEFAULT_FUND_KINDS:YAT,BYF}
      fund-codes: ${APP_EXTERNAL_API_TEFAS_FUND_CODES:}
    bist-datastore:
      enabled: ${APP_EXTERNAL_API_BIST_DATASTORE_ENABLED:true}
      base-url: ${APP_EXTERNAL_API_BIST_DATASTORE_BASE_URL:https://www.borsaistanbul.com}
      timeout: ${APP_EXTERNAL_API_BIST_DATASTORE_TIMEOUT:30000}
      latest-lookback-days: ${APP_EXTERNAL_API_BIST_DATASTORE_LATEST_LOOKBACK_DAYS:7}
      maturity-lookback-days: ${APP_EXTERNAL_API_BIST_DATASTORE_MATURITY_LOOKBACK_DAYS:120}
      health-path: ${APP_EXTERNAL_API_BIST_DATASTORE_HEALTH_PATH:/files/datafilepaths_viop.zip}
      bond-daily-bulletin-path-template: ${APP_EXTERNAL_API_BIST_DATASTORE_BOND_DAILY_TEMPLATE:/data/ttb/{yyyy}/{MM}/ttb{yyyyMMdd}3.zip}
      viop-daily-bulletin-path-template: ${APP_EXTERNAL_API_BIST_DATASTORE_VIOP_DAILY_TEMPLATE:/data/vadeli/viop_{yyyyMMdd}.csv}
    fintables:
      enabled: ${APP_EXTERNAL_API_FINTABLES_ENABLED:false}
      base-url: ${FINTABLES_BASE_URL:https://api.fintables.com}
      api-key: ${FINTABLES_API_KEY:}
      timeout: ${APP_EXTERNAL_API_FINTABLES_TIMEOUT:15000}

  market-data:
    max-active-fund-instruments: ${APP_MARKET_DATA_MAX_ACTIVE_FUND_INSTRUMENTS:500}
    max-active-viop-instruments: ${APP_MARKET_DATA_MAX_ACTIVE_VIOP_INSTRUMENTS:300}
    min-viop-volume: ${APP_MARKET_DATA_MIN_VIOP_VOLUME:1}

  # Cache TTL Configuration (in seconds)
  cache:
    currency-rates-ttl: ${APP_CACHE_CURRENCY_RATES_TTL:300}
    instruments-ttl: ${APP_CACHE_INSTRUMENTS_TTL:120}
    stock-prices-ttl: ${APP_CACHE_STOCK_PRICES_TTL:60}
    historical-data-ttl: ${APP_CACHE_HISTORICAL_DATA_TTL:300}
    index-values-ttl: ${APP_CACHE_INDEX_VALUES_TTL:300}
    simulation-config-ttl: ${APP_CACHE_SIMULATION_CONFIG_LEGACY_TTL:600}
    default-ttl: ${APP_CACHE_DEFAULT_TTL:300}
    news-ttl: ${APP_CACHE_NEWS_TTL:600}
    portfolio-ttl: ${APP_CACHE_PORTFOLIO_TTL:120}
    users-ttl: ${APP_CACHE_USERS_TTL:600}
    simulation:
      stock-ttl: ${APP_CACHE_SIMULATION_STOCK_TTL:300}
      currency-ttl: ${APP_CACHE_SIMULATION_CURRENCY_TTL:300}
      index-ttl: ${APP_CACHE_SIMULATION_INDEX_TTL:300}
      config-ttl: ${APP_CACHE_SIMULATION_CONFIG_TTL:600}

  # Scheduler Configuration
  # API Limits: Finnhub 60/min, Alpha Vantage 5/min
  # TCMB updates 2-3 times/day (no need for frequent polling)
  scheduler:
    enabled: true
    # TCMB: Only fetch twice daily (10:30, 16:30) - official rates
    tcmb-rates-cron: "${APP_SCHEDULER_TCMB_RATES_CRON:0 30 10,16 * * MON-FRI}"
    # BIST stocks: every 20 seconds during active market intervals.
    stock-prices-cron: "${APP_SCHEDULER_STOCK_PRICES_CRON:*/20 * * * * *}"
    # Bond prices: lower intraday volatility, every 2 minutes.
    bond-prices-cron: "${APP_SCHEDULER_BOND_PRICES_CRON:0 */2 * * * *}"
    # Fund prices: most funds update slower, every 3 minutes.
    fund-prices-cron: "${APP_SCHEDULER_FUND_PRICES_CRON:0 */3 * * * *}"
    # VIOP contracts: high intraday sensitivity, every 30 seconds.
    viop-prices-cron: "${APP_SCHEDULER_VIOP_PRICES_CRON:*/30 * * * * *}"
    # Non-TCMB Forex: Every 5 minutes (API rate limits apply)
    forex-rates-cron: "${APP_SCHEDULER_FOREX_RATES_CRON:0 */5 * * * MON-FRI}"
    # Instrument fetch count per scheduler cycle and per instrument type.
    instrument-batch-size: ${APP_SCHEDULER_INSTRUMENT_BATCH_SIZE:5}
    # News: Every 15 minutes
    news-fetch-cron: "${APP_SCHEDULER_NEWS_FETCH_CRON:0 */15 * * * *}"
    # Cleanup old data at 2 AM
    cleanup-cron: "${APP_SCHEDULER_CLEANUP_CRON:0 0 2 * * *}"

  # Rate Limiting Configuration
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    store: ${APP_RATE_LIMIT_STORE:redis}
    anonymous-requests-per-minute: ${APP_RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE:100}
    authenticated-requests-per-minute: ${APP_RATE_LIMIT_AUTHENTICATED_REQUESTS_PER_MINUTE:200}
    admin-requests-per-minute: ${APP_RATE_LIMIT_ADMIN_REQUESTS_PER_MINUTE:500}

  alert-webhook:
    enabled: ${APP_ALERT_WEBHOOK_ENABLED:true}
    require-signature: ${APP_ALERT_WEBHOOK_REQUIRE_SIGNATURE:false}
    secret: ${APP_ALERT_WEBHOOK_SECRET:}
    signature-header: ${APP_ALERT_WEBHOOK_SIGNATURE_HEADER:X-Alert-Signature}
    signature-prefix: ${APP_ALERT_WEBHOOK_SIGNATURE_PREFIX:sha256=}
    trust-forwarded-for: ${APP_ALERT_WEBHOOK_TRUST_FORWARDED_FOR:false}
    trusted-proxy-cidrs: ${APP_ALERT_WEBHOOK_TRUSTED_PROXY_CIDRS:}
    allowed-cidrs: ${APP_ALERT_WEBHOOK_ALLOWED_CIDRS:}

  # Email Configuration
  email:
    enabled: true
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from-address: ${EMAIL_FROM:noreply@mintstack.com}
    from-name: MintStack Finance
    tls-enabled: true
    ssl-enabled: false
    debug: false

# Logging Configuration
logging:
  level:
    root: INFO
    "[com.mintstack.finance]": DEBUG
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": INFO
    "[org.hibernate.type.descriptor.sql.BasicBinder]": INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    config-url: /api-docs/swagger-config
    url: /api-docs
    disable-swagger-default-url: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

logging:
  level:
    "[com.mintstack.finance]": DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
  flyway:
    validate-on-migrate: true
    out-of-order: false

logging:
  level:
    root: WARN
    "[com.mintstack.finance]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.hibernate.type.descriptor.sql.BasicBinder]": WARN
