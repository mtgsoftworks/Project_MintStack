spring:
  application:
    name: finance-portal

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mintstack_finance?useUnicode=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:mintstack}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        "[format_sql]": true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          "[time_zone]": UTC
    open-in-view: false

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    properties:
      "[security.protocol]": ${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
      "[sasl.mechanism]": ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:PLAIN}
      "[sasl.jaas.config]": ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: finance-portal
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "com.mintstack.finance.*"

  # Security - OAuth2 Resource Server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8180/realms/mintstack-finance}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8180/realms/mintstack-finance/protocol/openid-connect/certs}

# Server Configuration
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 10s
        slowCallRateThreshold: 100
    instances:
      tcmbApi:
        baseConfig: default
        waitDurationInOpenState: 120s
      finnhubApi:
        baseConfig: default
        failureRateThreshold: 60
      alphaVantageApi:
        baseConfig: default
        failureRateThreshold: 60
      yahooFinanceApi:
        baseConfig: default
      rssNewsApi:
        baseConfig: default
        failureRateThreshold: 70
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.net.SocketTimeoutException
          - org.springframework.web.reactive.function.client.WebClientRequestException
    instances:
      externalApi:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 15s
        cancelRunningFuture: true
    instances:
      externalApi:
        baseConfig: default

# OpenSearch Configuration
opensearch:
  host: ${OPENSEARCH_HOST:localhost}
  port: ${OPENSEARCH_PORT:19200}
  scheme: ${OPENSEARCH_SCHEME:http}
  username: ${OPENSEARCH_USERNAME:}
  password: ${OPENSEARCH_PASSWORD:}

# OpenTelemetry Configuration
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  service:
    name: ${OTEL_SERVICE_NAME:finance-portal}
  resource:
    attributes:
      service.namespace: mintstack
      deployment.environment: ${SPRING_PROFILES_ACTIVE:dev}

# Application Custom Configuration
app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:3001
      - http://127.0.0.1:3001
      - http://localhost:3002
      - http://127.0.0.1:3002
      - http://localhost:8088
      - http://127.0.0.1:8088
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600

  # External API Configuration
  external-api:
    tcmb:
      base-url: https://www.tcmb.gov.tr/kurlar
      timeout: 10000
    yahoo-finance:
      base-url: https://query1.finance.yahoo.com/v8/finance
      timeout: 15000
    alpha-vantage:
      base-url: https://www.alphavantage.co/query
      api-key: ${ALPHA_VANTAGE_API_KEY:demo}
      timeout: 15000
    finnhub:
      base-url: https://finnhub.io/api/v1
      api-key: ${FINNHUB_API_KEY:}
      timeout: 15000

  # Cache TTL Configuration (in seconds)
  cache:
    currency-rates-ttl: 300
    stock-prices-ttl: 60
    news-ttl: 600
    portfolio-ttl: 120

  # Scheduler Configuration
  # API Limits: Finnhub 60/min, Alpha Vantage 5/min
  # TCMB updates 2-3 times/day (no need for frequent polling)
  scheduler:
    enabled: true
    # TCMB: Only fetch twice daily (10:30, 16:30) - official rates
    tcmb-rates-cron: "0 30 10,16 * * MON-FRI"
    # Stocks/Crypto: Every 30 seconds (to respect API limits)
    # Changed from 15 seconds to 30 seconds to avoid rate limiting
    stock-prices-cron: "0 * * * * *"
    # Non-TCMB Forex: Every 5 minutes (API rate limits apply)
    forex-rates-cron: "0 */5 * * * MON-FRI"
    # Crypto: Every minute (24/7 markets)
    crypto-prices-cron: "0 * * * * *"
    # News: Every 15 minutes
    news-fetch-cron: "0 */15 * * * *"
    # Cleanup old data at 2 AM
    cleanup-cron: "0 0 2 * * *"

  # Rate Limiting Configuration
  rate-limit:
    enabled: true
    anonymous-requests-per-minute: 100
    authenticated-requests-per-minute: 200
    admin-requests-per-minute: 500

  # Email Configuration
  email:
    enabled: true
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    from-address: ${EMAIL_FROM:noreply@mintstack.com}
    from-name: MintStack Finance
    tls-enabled: true
    ssl-enabled: false
    debug: false

# Logging Configuration
logging:
  level:
    root: INFO
    "[com.mintstack.finance]": DEBUG
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": INFO
    "[org.hibernate.type.descriptor.sql.BasicBinder]": INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# Springdoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: false

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

logging:
  level:
    "[com.mintstack.finance]": DEBUG

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
  flyway:
    validate-on-migrate: true
    out-of-order: false

logging:
  level:
    root: WARN
    "[com.mintstack.finance]": INFO
    "[org.hibernate.SQL]": WARN
    "[org.hibernate.type.descriptor.sql.BasicBinder]": WARN
