services:
  # ===========================================
  # DATA LAYER
  # ===========================================
  
  postgres:
    image: postgres:15-alpine
    container_name: mintstack-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: mintstack_finance,keycloak,mintstack
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: mintstack-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: mintstack-keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN_USER_PASSWORD: ${KEYCLOAK_ADMIN_USER_PASSWORD}
      KEYCLOAK_TEST_USER_PASSWORD: ${KEYCLOAK_TEST_USER_PASSWORD}
      KEYCLOAK_FINANCE_BACKEND_SECRET: ${KEYCLOAK_FINANCE_BACKEND_SECRET}
      LDAP_BIND_CREDENTIAL: ${LDAP_BIND_CREDENTIAL}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      LDAP_CONNECTION_URL: ldap://openldap:389
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M

  openldap:
    image: osixia/openldap:1.5.0
    container_name: mintstack-openldap
    environment:
      LDAP_ORGANISATION: ${LDAP_ORGANISATION}
      LDAP_DOMAIN: ${LDAP_DOMAIN}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      # SECURITY: For production, set LDAP_TLS: "true" and configure certificates
      LDAP_TLS: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      - ./openldap/ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom
    ports:
      - "127.0.0.1:389:389"
      - "127.0.0.1:636:636"
    networks:
      - mintstack-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ===========================================
  # OBSERVABILITY LAYER
  # ===========================================

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mintstack-kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_LISTENER_NAME_INTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="${KAFKA_SASL_PASSWORD}" user_kafka="${KAFKA_SASL_PASSWORD}";
      KAFKA_LISTENER_NAME_EXTERNAL_PLAIN_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="${KAFKA_SASL_PASSWORD}" user_kafka="${KAFKA_SASL_PASSWORD}";
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # SECURITY: Generate a new cluster ID for each deployment
      # Command: echo "MkU3OEVBNTcwNTJENDM2Qk" | base64 -d | xxd -p | head -c 22
      # Or generate: openssl rand 22 | base64
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/9092'"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: mintstack-kafka-exporter
    command:
      - --kafka.server=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - mintstack-network
    deploy:
      resources:
        limits:
          memory: 128M

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: mintstack-opensearch
    environment:
      - cluster.name=mintstack-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - cluster.default_number_of_replicas=0
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      - plugins.security.disabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "127.0.0.1:19200:9200"
      - "9600:9600"
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "curl -k -s -u $${OPENSEARCH_ADMIN_USER:-admin}:$${OPENSEARCH_INITIAL_ADMIN_PASSWORD} https://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: mintstack-opensearch-dashboards
    ports:
      - "15601:5601"
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      # SECURITY: For production, set to 'certificate' with proper CA cert
      OPENSEARCH_SSL_VERIFICATIONMODE: none
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "false"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - mintstack-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M



  logstash:
    image: opensearchproject/logstash-oss-with-opensearch-output-plugin:8.9.0
    container_name: mintstack-logstash
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline
      - ./docker/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SECURITY_PROTOCOL: PLAINTEXT
      OPENSEARCH_HOSTS: https://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_SSL: true
      OPENSEARCH_SSL_VERIFY: false
    depends_on:
      - kafka
      - opensearch
    networks:
      - mintstack-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: mintstack-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    volumes:
      - ./docker/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "24317:4317"
      - "24318:4318"
    depends_on:
      - opensearch
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: mintstack-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  grafana:
    image: grafana/grafana:10.2.2
    container_name: mintstack-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:13030
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "13030:3000"
    depends_on:
      - prometheus
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: mintstack-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

  # ===========================================
  # APPLICATION LAYER
  # ===========================================

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mintstack-backend
    environment:
      TZ: Europe/Istanbul
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Europe/Istanbul"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT
      SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: PLAIN
      SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: org.apache.kafka.common.security.plain.PlainLoginModule required username="kafka" password="${KAFKA_SASL_PASSWORD}";
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/mintstack-finance/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/mintstack-finance

      APP_RATE_LIMIT_ENABLED: ${APP_RATE_LIMIT_ENABLED:-true}
      APP_RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_ANONYMOUS_REQUESTS_PER_MINUTE:-100}
      APP_RATE_LIMIT_AUTHENTICATED_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_AUTHENTICATED_REQUESTS_PER_MINUTE:-200}
      APP_RATE_LIMIT_ADMIN_REQUESTS_PER_MINUTE: ${APP_RATE_LIMIT_ADMIN_REQUESTS_PER_MINUTE:-500}
      APP_SCHEDULER_TCMB_RATES_CRON: "${APP_SCHEDULER_TCMB_RATES_CRON:-0 30 10,16 * * MON-FRI}"
      APP_SCHEDULER_STOCK_PRICES_CRON: "${APP_SCHEDULER_STOCK_PRICES_CRON:-*/20 * * * * *}"
      APP_SCHEDULER_BOND_PRICES_CRON: "${APP_SCHEDULER_BOND_PRICES_CRON:-0 */2 * * * *}"
      APP_SCHEDULER_FUND_PRICES_CRON: "${APP_SCHEDULER_FUND_PRICES_CRON:-0 */3 * * * *}"
      APP_SCHEDULER_VIOP_PRICES_CRON: "${APP_SCHEDULER_VIOP_PRICES_CRON:-*/30 * * * * *}"
      APP_SCHEDULER_FOREX_RATES_CRON: "${APP_SCHEDULER_FOREX_RATES_CRON:-0 */5 * * * MON-FRI}"
      APP_SCHEDULER_NEWS_FETCH_CRON: "${APP_SCHEDULER_NEWS_FETCH_CRON:-0 */15 * * * *}"
      APP_SCHEDULER_CLEANUP_CRON: "${APP_SCHEDULER_CLEANUP_CRON:-0 0 2 * * *}"
      APP_SCHEDULER_INSTRUMENT_BATCH_SIZE: ${APP_SCHEDULER_INSTRUMENT_BATCH_SIZE:-5}
      APP_NEWS_LLM_ENABLED: ${APP_NEWS_LLM_ENABLED:-true}
      APP_NEWS_LLM_BASE_URL: ${APP_NEWS_LLM_BASE_URL:-https://api.openai.com}
      APP_NEWS_LLM_ENDPOINT: ${APP_NEWS_LLM_ENDPOINT:-/v1/chat/completions}
      APP_NEWS_LLM_MODEL: ${APP_NEWS_LLM_MODEL:-gpt-4.1-mini}
      APP_NEWS_LLM_API_KEY: ${OPENAI_API_KEY:-}
      APP_NEWS_LLM_API_KEY_HEADER: ${APP_NEWS_LLM_API_KEY_HEADER:-Authorization}
      APP_NEWS_LLM_API_KEY_PREFIX: ${APP_NEWS_LLM_API_KEY_PREFIX:-Bearer}
      APP_NEWS_LLM_TIMEOUT_MS: ${APP_NEWS_LLM_TIMEOUT_MS:-15000}
      APP_NEWS_LLM_MAX_INPUT_CHARS: ${APP_NEWS_LLM_MAX_INPUT_CHARS:-4000}
      APP_NEWS_LLM_TEMPERATURE: ${APP_NEWS_LLM_TEMPERATURE:-0.2}
      APP_EXTERNAL_API_FINTABLES_ENABLED: ${APP_EXTERNAL_API_FINTABLES_ENABLED:-true}
      FINTABLES_BASE_URL: ${FINTABLES_BASE_URL:-https://api.fintables.com}
      FINTABLES_API_KEY: ${FINTABLES_API_KEY:-}
      APP_EXTERNAL_API_FINTABLES_TIMEOUT: ${APP_EXTERNAL_API_FINTABLES_TIMEOUT:-15000}
      APP_ALERT_WEBHOOK_ENABLED: ${APP_ALERT_WEBHOOK_ENABLED:-true}
      APP_ALERT_WEBHOOK_REQUIRE_SIGNATURE: ${APP_ALERT_WEBHOOK_REQUIRE_SIGNATURE:-false}
      APP_ALERT_WEBHOOK_SECRET: ${APP_ALERT_WEBHOOK_SECRET:-}
      APP_ALERT_WEBHOOK_SIGNATURE_HEADER: ${APP_ALERT_WEBHOOK_SIGNATURE_HEADER:-X-Alert-Signature}
      APP_ALERT_WEBHOOK_SIGNATURE_PREFIX: ${APP_ALERT_WEBHOOK_SIGNATURE_PREFIX:-sha256=}
      APP_ALERT_WEBHOOK_TRUST_FORWARDED_FOR: ${APP_ALERT_WEBHOOK_TRUST_FORWARDED_FOR:-false}
      APP_ALERT_WEBHOOK_TRUSTED_PROXY_CIDRS: ${APP_ALERT_WEBHOOK_TRUSTED_PROXY_CIDRS:-}
      APP_ALERT_WEBHOOK_ALLOWED_CIDRS: ${APP_ALERT_WEBHOOK_ALLOWED_CIDRS:-172.16.0.0/12}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: finance-portal
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OPENSEARCH_SCHEME: https
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8088/api/v1
        VITE_WS_URL: http://localhost:8088/ws
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    container_name: mintstack-frontend
    environment:
      VITE_API_URL: http://localhost:8088/api/v1
      VITE_WS_URL: http://localhost:8088/ws
      VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL}
      VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
      VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    ports:
      - "3002:3000"
    depends_on:
      - backend
    networks:
      - mintstack-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  nginx:
    image: nginx:alpine
    container_name: mintstack-nginx
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - mintstack-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

networks:
  mintstack-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  openldap_data:
  openldap_config:
  kafka_data:
  opensearch_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
