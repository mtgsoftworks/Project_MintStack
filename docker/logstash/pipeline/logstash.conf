input {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
    topics => ["mintstack-logs"]
    group_id => "logstash-consumer"
    client_id => "mintstack-logstash"
    group_instance_id => "mintstack-logstash"
    codec => json
    consumer_threads => 1
    auto_offset_reset => "latest"
    max_poll_records => 200
    max_poll_interval_ms => 300000
    session_timeout_ms => 30000
    heartbeat_interval_ms => 10000
    request_timeout_ms => 60000
    fetch_max_wait_ms => 500
    decorate_events => "basic"
    security_protocol => "${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}"
    sasl_mechanism => "${KAFKA_SASL_MECHANISM:PLAIN}"
    sasl_jaas_config => "${KAFKA_SASL_JAAS_CONFIG:}"
  }
}

filter {
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }

  if ![timestamp] {
    ruby {
      code => "event.set('timestamp', Time.now.utc.iso8601(3))"
    }
  }

  if [parsed][traceId] {
    mutate {
      add_field => { "trace_id" => "%{[parsed][traceId]}" }
    }
  }

  if [parsed][spanId] {
    mutate {
      add_field => { "span_id" => "%{[parsed][spanId]}" }
    }
  }

  if [parsed][level] {
    mutate {
      add_field => { "log_level" => "%{[parsed][level]}" }
    }
  }

  mutate {
    add_field => { 
      "[@metadata][index_prefix]" => "mintstack-logs"
    }
  }
}

output {
  opensearch {
    hosts => ["${OPENSEARCH_HOSTS:http://opensearch:9200}"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    action => "index"
    user => "${OPENSEARCH_USERNAME:admin}"
    password => "${OPENSEARCH_PASSWORD:}"
    ssl => "${OPENSEARCH_SSL:false}"
    ssl_certificate_verification => "${OPENSEARCH_SSL_VERIFY:false}"
  }
}
