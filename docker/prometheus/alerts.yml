# Alert Rules for MintStack Finance Portal
groups:
  - name: mintstack-backend-alerts
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          /
          clamp_min(sum(rate(http_server_requests_seconds_count[5m])), 0.001)
          > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate detected"
          description: "Backend is returning more than 10% server errors in the last 5 minutes."

      # Circuit Breaker Open
      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker {{ $labels.name }} is OPEN"
          description: "External API {{ $labels.name }} circuit breaker has opened due to failures."

      # High latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "95th percentile latency is above 2 seconds."

      # JVM heap memory high
      - alert: HighHeapMemory
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap memory usage is high"
          description: "JVM heap memory usage is above 85%."

      # Database connection pool exhausted
      - alert: DBConnectionPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "HikariCP connection pool is above 90% utilization."

      # Application down
      - alert: ApplicationDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend application is down"
          description: "The MintStack backend application is not responding to health checks."

  - name: mintstack-external-api-alerts
    rules:
      # External API slow response
      - alert: ExternalAPISlowResponse
        expr: |
          (
            sum by (client, method) (rate(external_api_call_duration_seconds_sum{client!="RssNewsClient"}[5m]))
            /
            clamp_min(sum by (client, method) (rate(external_api_call_duration_seconds_count{client!="RssNewsClient"}[5m])), 0.001)
          ) > 5
          or
          (
            sum by (client, method) (rate(external_api_call_duration_seconds_sum{client="RssNewsClient"}[5m]))
            /
            clamp_min(sum by (client, method) (rate(external_api_call_duration_seconds_count{client="RssNewsClient"}[5m])), 0.001)
          ) > 15
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "External API {{ $labels.client }} responding slowly"
          description: "Average response time from {{ $labels.client }} is above 5 seconds."

      # External API high failure rate
      - alert: ExternalAPIHighFailureRate
        expr: sum by (client, method) (rate(external_api_call_duration_seconds_count{status="error"}[5m])) / clamp_min(sum by (client, method) (rate(external_api_call_duration_seconds_count[5m])), 0.001) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High failure rate for external API {{ $labels.client }}"
          description: "More than 30% of requests to {{ $labels.client }} are failing."

  - name: mintstack-infrastructure-alerts
    rules:
      # Kafka consumer lag
      - alert: KafkaConsumerLag
        expr: kafka_consumergroup_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high"
          description: "Consumer lag for topic {{ $labels.topic }} is above 1000 messages."
