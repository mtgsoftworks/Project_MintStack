# Prometheus Configuration for MintStack Finance Portal
# Production configuration with basic auth (I3)
# Create web.yml with: htpasswd -nBC 10 "" | tr -d ':\n' | sed 's/$2y/$2b/'
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'mintstack-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Alert rules
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # Backend Spring Boot application
  - job_name: 'backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'mintstack-backend'

  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    scrape_interval: 15s
    static_configs:
      - targets: ['otel-collector:8889']

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Redis (if redis_exporter is available)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # PostgreSQL (if postgres_exporter is available)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
