# Prometheus Basic Auth Configuration
# ==========================================
#
# SECURITY: This file MUST be customized before any deployment.
# The default password "changeme" is INSECURE and must be changed.
#
# Generate a new bcrypt hash:
#   # Using htpasswd (Linux/macOS)
#   htpasswd -nBC 10 admin
#
#   # Using Python
#   pip install bcrypt
#   python3 -c "import bcrypt; print(bcrypt.hashpw(b'YOUR_SECURE_PASSWORD', bcrypt.gensalt(rounds=12)).decode())"
#
# IMPORTANT:
#   - Use minimum 16 character passwords
#   - Never use the same password as other services
#   - Store the plain password securely (e.g., secrets/ directory)
#   - Rotate passwords regularly
#
# ==========================================

