# Alertmanager Configuration for MintStack Finance Portal
#
# Development/demo profile is webhook-only. Do not enable email receivers here
# unless SMTP credentials are also supplied; otherwise Alertmanager retries Gmail
# forever and pollutes the runtime logs with authentication failures.

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'
  
  # Group alerts by these labels
  group_by: ['alertname', 'severity']
  
  # Wait before sending first notification
  group_wait: 30s
  
  # Wait before sending next notification about same group
  group_interval: 5m
  
  # Repeat notification interval
  repeat_interval: 4h

  # Child routes for specific alert handling
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
    
    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning-receiver'
      group_wait: 1m
      repeat_interval: 4h

# Receivers
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://backend:8080/api/v1/admin/webhooks/alerts'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://backend:8080/api/v1/admin/webhooks/alerts'
        send_resolved: true

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://backend:8080/api/v1/admin/webhooks/alerts'
        send_resolved: true

# Inhibition rules - prevent notification floods
inhibit_rules:
  # If ApplicationDown is firing, suppress all other backend alerts
  - source_match:
      alertname: 'ApplicationDown'
    target_match_re:
      alertname: '.*'
    equal: ['job']
  
  # If critical, suppress warning for same alertname
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
