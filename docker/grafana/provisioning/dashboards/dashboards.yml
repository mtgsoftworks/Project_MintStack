# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'MintStack Dashboards'
    orgId: 1
    folder: 'MintStack'
    folderUid: 'mintstack'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
