name: MintStack CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20.19.0"

jobs:
  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository history
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Test and package backend
        run: ./mvnw -B -ntp clean verify -DskipITs=false
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/*.xml
          retention-days: 30

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 30

      - name: Cache OWASP vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.m2/dependency-check-data
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: OWASP Dependency Check
        continue-on-error: true
        timeout-minutes: 5
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: >
          ./mvnw -B -ntp org.owasp:dependency-check-maven:check
          -DfailBuildOnCVSS=7
          -DdataDirectory=$HOME/.m2/dependency-check-data
          -DnvdApiKey=$NVD_API_KEY

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

      - name: Validate Flyway migrations
        run: |
          ./mvnw -B -ntp org.flywaydb:flyway-maven-plugin:10.20.1:migrate \
            -Dflyway.url=jdbc:postgresql://localhost:5432/testdb \
            -Dflyway.user=testuser \
            -Dflyway.password=testpass \
            -Dflyway.locations=filesystem:src/main/resources/db/migration
          ./mvnw -B -ntp org.flywaydb:flyway-maven-plugin:10.20.1:validate \
            -Dflyway.url=jdbc:postgresql://localhost:5432/testdb \
            -Dflyway.user=testuser \
            -Dflyway.password=testpass \
            -Dflyway.locations=filesystem:src/main/resources/db/migration

  frontend:
    name: Frontend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --run --coverage

      - name: Upload Frontend Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/coverage/
          retention-days: 30

      - name: Build frontend
        run: npm run build

  e2e:
    name: Frontend E2E Smoke
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Chromium E2E suite
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  images:
    name: Build and Scan Application Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mintstack-backend:ci ./backend

      - name: Build frontend image
        run: >
          docker build
          --build-arg VITE_API_URL=/api/v1
          --build-arg VITE_KEYCLOAK_URL=https://mintstack.example/auth
          --build-arg VITE_WS_URL=wss://mintstack.example/ws
          -t mintstack-frontend:ci ./frontend

      - name: Scan backend image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mintstack-backend:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Scan frontend image
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mintstack-frontend:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

  compose:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate development compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate lightweight compose
        run: docker compose -f docker-compose.light.yml config > /dev/null

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config > /dev/null
        env:
          PUBLIC_APP_ORIGIN: https://mintstack.example
          VITE_KEYCLOAK_URL: https://mintstack.example/auth
          VITE_WS_URL: wss://mintstack.example/ws
          POSTGRES_DB: mintstack
          POSTGRES_USER: mintstack
          KAFKA_SASL_PASSWORD: ci-placeholder
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: ci-placeholder
          KEYCLOAK_ADMIN: admin
          LDAP_ORGANISATION: MintStack
          LDAP_DOMAIN: mintstack.local
