name: MintStack CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"

jobs:
  backend-test:
    name: Backend Tests (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run backend unit tests
        run: ./mvnw -B -ntp clean verify
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Validate Flyway migrations
        run: >
          ./mvnw -B -ntp org.flywaydb:flyway-maven-plugin:10.17.0:validate
          -Dflyway.url=jdbc:postgresql://localhost:5432/testdb
          -Dflyway.user=testuser
          -Dflyway.password=testpass
          -Dflyway.locations=filesystem:src/main/resources/db/migration

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          if-no-files-found: warn

      - name: Upload backend coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/
          if-no-files-found: warn

      - name: Upload backend package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: backend/target/*.jar
          if-no-files-found: error

  frontend-test:
    name: Frontend Tests (React + TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test -- --run --coverage

      - name: Build frontend
        run: npm run build

      - name: Upload frontend coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: warn

      - name: Upload frontend package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-package
          path: frontend/dist/
          if-no-files-found: error

  compose-validate:
    name: Compose Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate development compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config > /dev/null

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-test
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          VITE_E2E_BYPASS_AUTH: "true"
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn

  docker-smoke:
    name: Docker Image Smoke Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, compose-validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker buildx build --load -t mintstack-backend:ci-${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker buildx build --load -t mintstack-frontend:ci-${{ github.sha }} ./frontend

      - name: Verify images
        run: |
          docker image inspect mintstack-backend:ci-${{ github.sha }} > /dev/null
          docker image inspect mintstack-frontend:ci-${{ github.sha }} > /dev/null
