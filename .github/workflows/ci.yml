name: MintStack CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ===========================================
  # Backend Build & Test
  # ===========================================
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ secrets.TEST_DB_NAME || 'testdb' }}
          POSTGRES_USER: ${{ secrets.TEST_DB_USER || 'testuser' }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_DB_PASSWORD || 'testpass' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.TEST_DB_USER || 'testuser' }}"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests
        run: mvn clean verify -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Flyway migration validation
        run: >
          mvn -B org.flywaydb:flyway-maven-plugin:10.17.0:validate
          -Dflyway.url=jdbc:postgresql://localhost:5432/${{ secrets.TEST_DB_NAME || 'testdb' }}
          -Dflyway.user=${{ secrets.TEST_DB_USER || 'testuser' }}
          -Dflyway.password=${{ secrets.TEST_DB_PASSWORD || 'testpass' }}
          -Dflyway.locations=filesystem:src/main/resources/db/migration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

      - name: Upload JaCoCo coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  # ===========================================
  # Frontend Build & Test
  # ===========================================
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run --coverage

      - name: Build
        run: npm run build

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  # ===========================================
  # Docker Compose Validation
  # ===========================================
  compose-validate:
    name: Compose Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate default compose
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Validate secure-dev compose
        run: docker compose -f docker-compose.yml -f docker-compose.secure-dev.yml config > /dev/null

      - name: Validate light compose
        run: docker compose -f docker-compose.light.yml config > /dev/null

      - name: Validate KRaft compose
        run: docker compose -f docker-compose.yml -f docker-compose.kraft.yml config > /dev/null

  # ===========================================
  # E2E Tests
  # ===========================================
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: frontend/test-results/

  # ===========================================
  # Docker Build
  # ===========================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mintstack-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t mintstack-frontend:${{ github.sha }} ./frontend

      - name: Verify images
        run: |
          docker images | grep mintstack

  # ===========================================
  # Security Scanning (H1)
  # ===========================================
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t mintstack-backend:${{ github.sha }} ./backend
          docker build -t mintstack-frontend:${{ github.sha }} ./frontend

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mintstack-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'mintstack-frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results (Backend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Upload Trivy scan results (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'
