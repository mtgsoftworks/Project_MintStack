name: MintStack Docker Build

on:
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: docker buildx build --load -t mintstack-backend:ci ./backend

      - name: Build frontend image
        run: docker buildx build --load -t mintstack-frontend:ci ./frontend

      - name: Inspect images
        run: |
          docker image inspect mintstack-backend:ci > /dev/null
          docker image inspect mintstack-frontend:ci > /dev/null
