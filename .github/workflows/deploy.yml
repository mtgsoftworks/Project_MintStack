name: MintStack CD

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - staging
          - production

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  publish-images:
    name: Publish Docker Images (GHCR)
    runs-on: ubuntu-latest
    outputs:
      backend-digest: ${{ steps.build-backend.outputs.digest }}
      frontend-digest: ${{ steps.build-frontend.outputs.digest }}
      backend_image: ${{ steps.image-vars.outputs.backend_image }}
      frontend_image: ${{ steps.image-vars.outputs.frontend_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image names
        id: image-vars
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER_LC}/mintstack-backend" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.REGISTRY }}/${OWNER_LC}/mintstack-frontend" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-vars.outputs.backend_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-vars.outputs.frontend_image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  scan-images:
    name: Scan Images (Trivy)
    runs-on: ubuntu-latest
    needs: publish-images
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ needs.publish-images.outputs.backend_image }}@${{ needs.publish-images.outputs.backend-digest }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ needs.publish-images.outputs.frontend_image }}@${{ needs.publish-images.outputs.frontend-digest }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload backend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend

      - name: Upload frontend SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend

  sign-images:
    name: Sign Images (Cosign)
    runs-on: ubuntu-latest
    needs: publish-images
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4

      - name: Sign backend and frontend images
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ needs.publish-images.outputs.backend_image }}@${{ needs.publish-images.outputs.backend-digest }}
          cosign sign --yes ${{ needs.publish-images.outputs.frontend_image }}@${{ needs.publish-images.outputs.frontend-digest }}

      - name: Verify signatures
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign verify ${{ needs.publish-images.outputs.backend_image }}@${{ needs.publish-images.outputs.backend-digest }} --certificate-identity-regexp=".*" --certificate-oidc-issuer-regexp=".*"
          cosign verify ${{ needs.publish-images.outputs.frontend_image }}@${{ needs.publish-images.outputs.frontend-digest }} --certificate-identity-regexp=".*" --certificate-oidc-issuer-regexp=".*"

  release-assets:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend package
        working-directory: backend
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp clean package -DskipTests

      - name: Build frontend package
        working-directory: frontend
        run: |
          npm ci
          npm run build
          tar -czf ../frontend-dist-${{ github.ref_name }}.tar.gz dist

      - name: Create/Update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            backend/target/*.jar
            frontend-dist-${{ github.ref_name }}.tar.gz

  deploy-staging:
    name: Deploy Staging (SSH)
    runs-on: ubuntu-latest
    needs: [publish-images, sign-images, scan-images]
    if: >
      (
        github.event_name == 'workflow_dispatch' &&
        github.event.inputs.environment == 'staging'
      )
    env:
      STAGING_HOST: ${{ secrets.STAGING_HOST }}
      STAGING_USER: ${{ secrets.STAGING_USER }}
      STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
    environment: staging
    steps:
      - name: Skip when staging secrets are missing
        if: ${{ env.STAGING_HOST == '' || env.STAGING_USER == '' || env.STAGING_SSH_KEY == '' }}
        run: echo "Staging secrets are missing. Skipping deployment."

      - name: Deploy on staging host
        if: ${{ env.STAGING_HOST != '' && env.STAGING_USER != '' && env.STAGING_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        with:
          host: ${{ env.STAGING_HOST }}
          username: ${{ env.STAGING_USER }}
          key: ${{ env.STAGING_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-/opt/mintstack}"
            docker compose -f docker-compose.prod.yml up -d --build backend frontend nginx

  deploy-production:
    name: Deploy Production (SSH)
    runs-on: ubuntu-latest
    needs: [publish-images, sign-images, scan-images]
    if: >
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') ||
        (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-'))
      )
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
      PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
    environment:
      name: production
      url: https://mintstack.example.com
    steps:
      - name: Skip when production secrets are missing
        if: ${{ env.PROD_HOST == '' || env.PROD_USER == '' || env.PROD_SSH_KEY == '' }}
        run: echo "Production secrets are missing. Skipping deployment."

      - name: Deploy on production host
        if: ${{ env.PROD_HOST != '' && env.PROD_USER != '' && env.PROD_SSH_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        with:
          host: ${{ env.PROD_HOST }}
          username: ${{ env.PROD_USER }}
          key: ${{ env.PROD_SSH_KEY }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "${DEPLOY_PATH:-/opt/mintstack}"
            docker compose -f docker-compose.prod.yml up -d --build backend frontend nginx
